services:
    redis:
        image: redis:8.4.0
        container_name: redis
        command:
            - redis-server
        restart: unless-stopped

    celery:
        image: ${BACKEND_IMAGE:-ghcr.io/desmitry/charisma-master-backend:latest}
        build:
            context: ./backend
            dockerfile: ./Dockerfile
        container_name: celery
        user: "1000:1000"
        environment:
            - MPLCONFIGDIR=/tmp/matplotlib
        command:
            [
                "celery",
                "-A",
                "app.celery_app",
                "worker",
                "--loglevel=info",
                "--pool=solo",
            ]
        restart: unless-stopped
        env_file:
            - ./backend/.docker.env
        depends_on:
            - redis
        volumes:
            - ./backend/media:/backend/app/media

    backend:
        image: ${BACKEND_IMAGE:-ghcr.io/desmitry/charisma-master-backend:latest}
        build:
            context: ./backend
            dockerfile: ./Dockerfile
        container_name: backend
        user: "1000:1000"
        environment:
            - MPLCONFIGDIR=/tmp/matplotlib
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--timeout-keep-alive",
                "600",
            ]
        restart: unless-stopped
        env_file:
            - ./backend/.docker.env
        ports:
            - 127.0.0.1:8000:8000
        depends_on:
            - celery
        volumes:
            - ./backend/media:/backend/app/media

    frontend:
        image: ${FRONTEND_IMAGE:-ghcr.io/desmitry/charisma-master-frontend:latest}
        build:
            context: ./frontend
            dockerfile: ./Dockerfile
        container_name: frontend
        command: ["npm", "start"]
        restart: unless-stopped
        ports:
            - 127.0.0.1:3030:3000
        environment:
            - NODE_ENV=production
            - PORT=3000
            - BACKEND_URL=http://backend:8000
        depends_on:
            - backend
