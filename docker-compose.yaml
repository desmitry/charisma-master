services:
  redis:
    image: redis:8.4.0
    container_name: redis
    command:
      - redis-server
    restart: always

  celery:
    image: ghcr.io/desmitry/charisma-master-backend:latest
    container_name: celery
    command: [ "celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--pool=solo" ]
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis

  backend:
    image: ghcr.io/desmitry/charisma-master-backend:latest
    container_name: backend
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - ORIGIN_URL=http://localhost:3030
    ports:
      - 127.0.0.1:8000:8000
    depends_on:
      - celery

  frontend:
    image: ghcr.io/desmitry/charisma-master-frontend:latest
    container_name: frontend
    command: [ "npm", "start" ]
    restart: always
    ports:
      - 127.0.0.1:3030:3000
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend
