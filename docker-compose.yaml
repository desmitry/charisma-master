services:
    redis:
        image: redis:8.6.2
        container_name: redis
        command:
            - redis-server
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3

    ml_worker:
        image: ${ML_WORKER_IMAGE:-ghcr.io/desmitry/charisma-master-ml-worker:latest}
        build:
            context: ./services/ml_worker
            dockerfile: ./Dockerfile
        container_name: ml_worker
        user: "1000:1000"
        command:
            [
                "celery",
                "-A",
                "app.celery_app",
                "worker",
                "--loglevel=info",
                "--pool=solo",
            ]
        restart: unless-stopped
        env_file:
            - ./services/ml_worker/.docker.env
        depends_on:
            redis:
                condition: service_healthy

    api_gateway:
        image: ${API_GATEWAY_IMAGE:-ghcr.io/desmitry/charisma-master-api-gateway:latest}
        build:
            context: ./services/api_gateway
            dockerfile: ./Dockerfile
        container_name: api_gateway
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--timeout-keep-alive",
                "600",
            ]
        restart: unless-stopped
        env_file:
            - ./services/api_gateway/.docker.env
        ports:
            - 127.0.0.1:8000:8000
        depends_on:
            redis:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
            interval: 30s
            timeout: 10s
            start_period: 60s
            retries: 3

    frontend:
        image: ${FRONTEND_IMAGE:-ghcr.io/desmitry/charisma-master-frontend:latest}
        build:
            context: ./services/frontend
            dockerfile: ./Dockerfile
        container_name: frontend
        command: ["npm", "start"]
        restart: unless-stopped
        ports:
            - 127.0.0.1:3030:3000
        environment:
            - NODE_ENV=production
            - PORT=3000
            - BACKEND_URL=http://api_gateway:8000
        depends_on:
            api_gateway:
                condition: service_healthy
