volumes:
    postgres_data:

services:
    redis:
        image: redis:8.4.0
        container_name: redis
        command:
            - redis-server
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: charisma
            POSTGRES_PASSWORD: charisma
            POSTGRES_DB: charisma
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U charisma"]
            interval: 5s
            timeout: 5s
            retries: 5

    celery:
        image: ${BACKEND_IMAGE:-ghcr.io/desmitry/charisma-master-backend:latest}
        build:
            context: ./backend
            dockerfile: ./Dockerfile
        container_name: celery
        environment:
            - MPLCONFIGDIR=/tmp/matplotlib
            - NUMBA_CACHE_DIR=/tmp/numba
        command:
            [
                "celery",
                "-A",
                "app.celery_app",
                "worker",
                "--loglevel=info",
                "--pool=solo",
            ]
        restart: unless-stopped
        env_file:
            - ./backend/.docker.env
        depends_on:
            - redis
            - postgres
        volumes:
            - ./backend/media:/backend/app/media

    backend:
        image: ${BACKEND_IMAGE:-ghcr.io/desmitry/charisma-master-backend:latest}
        build:
            context: ./backend
            dockerfile: ./Dockerfile
        container_name: backend
        environment:
            - MPLCONFIGDIR=/tmp/matplotlib
            - NUMBA_CACHE_DIR=/tmp/numba
        command:
            [
                "uvicorn",
                "app.main:app",
                "--host",
                "0.0.0.0",
                "--port",
                "8000",
                "--timeout-keep-alive",
                "600",
            ]
        restart: unless-stopped
        env_file:
            - ./backend/.docker.env
        ports:
            - 127.0.0.1:8000:8000
        depends_on:
            - celery
            - postgres
        volumes:
            - ./backend/media:/backend/app/media

    frontend:
        image: ${FRONTEND_IMAGE:-ghcr.io/desmitry/charisma-master-frontend:latest}
        build:
            context: ./frontend
            dockerfile: ./Dockerfile
        container_name: frontend
        command: ["npm", "start"]
        restart: unless-stopped
        ports:
            - 127.0.0.1:3030:3000
        environment:
            - NODE_ENV=production
            - PORT=3000
            - BACKEND_URL=http://backend:8000
        depends_on:
            - backend
