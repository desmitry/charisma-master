name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/desmitry/charisma-master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check --config ./pyproject.toml

      - name: Run ruff format check
        run: ruff format --check --config ./pyproject.toml

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api_gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api-gateway:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api-gateway:latest

      - name: Build and push ml-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/ml_worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ml-worker:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-ml-worker:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Build and push migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/migrator/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-migrator:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-migrator:latest
