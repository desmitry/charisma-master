name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/desmitry/charisma-master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check --config ./pyproject.toml

      - name: Run ruff format check
        run: ruff format --check --config ./pyproject.toml

  release:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          uvx semantic-release version --no-commit
          version=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Version: $version"

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen --all-packages --group dev

      - name: Run tests
        run: uv run pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api_gateway/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-api-gateway:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api-gateway:latest
            ${{ env.IMAGE_PREFIX }}-api-gateway:${{ needs.release.outputs.version }}

      - name: Build and push ml-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/ml_worker/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-ml-worker:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-ml-worker:latest
            ${{ env.IMAGE_PREFIX }}-ml-worker:${{ needs.release.outputs.version }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Build and push migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/migrator/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-migrator:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-migrator:latest
            ${{ env.IMAGE_PREFIX }}-migrator:${{ needs.release.outputs.version }}
