---
# Production resource limits for api-gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: charisma
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
# Production resource limits for ml-worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker
  namespace: charisma
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: ml-worker
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
