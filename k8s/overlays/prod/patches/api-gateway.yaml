apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: charisma
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
