apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: charisma
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/part-of: charisma
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: seaweedfs
  ports:
    - port: 9333
      targetPort: 9333
      protocol: TCP
      name: master
    - port: 8333
      targetPort: 8333
      protocol: TCP
      name: s3
