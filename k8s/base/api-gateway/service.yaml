apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: charisma
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: charisma
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
