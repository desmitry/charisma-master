apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: charisma
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: charisma
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: charisma
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/desmitry/charisma-master-api-gateway:latest
          command:
            - uvicorn
            - app.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --timeout-keep-alive
            - "600"
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: charisma-config
            - secretRef:
                name: charisma-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
