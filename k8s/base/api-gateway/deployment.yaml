apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: charisma
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: charisma-migrator-waiter
      initContainers:
        - name: wait-for-migrator
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          command:
            - kubectl
            - wait
            - --for=condition=complete
            - --timeout=600s
            - job/migrator
      containers:
        - name: api-gateway
          image: ghcr.io/desmitry/charisma-master-api-gateway:latest
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --timeout-keep-alive
            - "600"
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: charisma-config
            - secretRef:
                name: charisma-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
