# IMPORTANT: This file contains PLACEHOLDER values only.
# Do NOT commit real secrets to version control.
# Replace via `kubectl create secret generic charisma-secrets ...`
# or an external secret manager (Vault, SealedSecrets, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: charisma-secrets
  namespace: charisma
type: Opaque
stringData:
  POSTGRES_USER: "charisma"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "charisma"
  DATABASE_URL: "postgresql://charisma:REPLACE_ME@postgres:5432/charisma"
  SEAWEEDFS_ACCESS_KEY: "REPLACE_ME"
  SEAWEEDFS_SECRET_KEY: "REPLACE_ME"
  GIGACHAT_CREDENTIALS: "REPLACE_ME"
  GIGACHAT_VERIFY_SSL: "false"
  SBER_SALUTE_CREDENTIALS: "REPLACE_ME"
  OPENAI_API_KEY: "REPLACE_ME"
