---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: charisma-migrator-waiter
  namespace: charisma
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: migrator-job-reader
  namespace: charisma
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: migrator-waiter-binding
  namespace: charisma
subjects:
  - kind: ServiceAccount
    name: charisma-migrator-waiter
    namespace: charisma
roleRef:
  kind: Role
  name: migrator-job-reader
  apiGroup: rbac.authorization.k8s.io
