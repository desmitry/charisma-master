apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: charisma
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/desmitry/charisma-master-frontend:latest
          command: ["npm", "start"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: charisma-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
