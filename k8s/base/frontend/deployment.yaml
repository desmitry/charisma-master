apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: charisma
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: charisma
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: charisma
    spec:
      containers:
        - name: frontend
          image: ghcr.io/desmitry/charisma-master-frontend:latest
          command:
            - npm
            - start
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: charisma-config
            - secretRef:
                name: charisma-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
