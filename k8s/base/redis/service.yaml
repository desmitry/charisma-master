apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: charisma
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: charisma
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
